<html lang="ja">
<head>
<meta charset="UTF-8">
<title>忍 -SHINOBI TIMESTOP-</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #07070d; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
canvas { display: block; cursor: crosshair; }

<body>
<canvas id="c"></canvas>
<script>
// ─── CONSTANTS ───────────────────────────────────────────────
const CW = 900, CH = 680;
const COLS = 20, ROWS = 15, CS = 40; // cell size
const FX = 50, FY = 60;              // field origin
const FW = COLS * CS, FH = ROWS * CS;
const TANK_SZ = 28, BULLET_R = 4;
const MINE_R = 9, MINE_LIFE = 600, MINE_EXPL = 55, MINE_TRIG = 22;
const PLAYER_SPEED = 1.9, BULLET_SPD = 5.5;
const MIN_TS = 0.06;  // 停止時でも世界はわずかに進む（完全停止にしない）
const TS_MAX = 1.18;  // 通常時は原速よりやや速い（時間停止で楽になる分の補正）

// 五遁（流派）。流派により装束・手裏剣・UIの差し色が変わる
const ELEM_KEYS=['FIRE','WATER','EARTH','WIND','THUNDER'];
const GOTON={
  FIRE:   {kanji:'火', name:'火遁', col:'#E8503A', glow:'#FF9D5F', garb:'#7E3026', bullet:'#FFD9C9', desc:'烈火の如く。朱の手裏剣が闇を裂く。'},
  WATER:  {kanji:'水', name:'水遁', col:'#4FA8D8', glow:'#8FD4FF', garb:'#2C5876', bullet:'#D9EEFF', desc:'静水の如く。蒼き刃は音もなく沈む。'},
  EARTH:  {kanji:'土', name:'土遁', col:'#C9963F', glow:'#E8C97D', garb:'#6E552B', bullet:'#F2E3C2', desc:'大地の如く。揺るがぬ構えで敵を断つ。'},
  WIND:   {kanji:'風', name:'風遁', col:'#5FB98A', glow:'#9FE8C0', garb:'#2F6248', bullet:'#D2F2E0', desc:'疾風の如く。翠の軌跡だけが残る。'},
  THUNDER:{kanji:'雷', name:'雷遁', col:'#E3C94E', glow:'#FFF09D', garb:'#75682B', bullet:'#FFF6C9', desc:'雷光の如く。金色の閃きが刹那を奪う。'},
};
function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}

const FJ = '"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif'; // 和風フォント
const WASHI = '#F2E8D5', SHU = '#E84A3F', SUMI = '#11131c', KIN = '#D4AF37';

const T = { EMPTY:0, WALL:1, DEST:2, PIT:3 };
const ST = { TITLE:'title', PLAY:'play', PAUSE:'pause', CLEAR:'clear', OVER:'over', RESULT:'result' };

// 刺客（敵忍者）。性能・AIはタンク版と同一、見た目と名だけ和風
const ETYPES = {
  BROWN:  { col:'#8a6234', jname:'木偶', spd:0,   maxB:1, bnc:1, maxM:0 },
  GREY:   { col:'#8d939c', jname:'下忍', spd:1.0, maxB:1, bnc:1, maxM:0 },
  TEAL:   { col:'#3fa8a0', jname:'吹矢', spd:1.0, maxB:1, bnc:0, maxM:0, rocket:true },
  YELLOW: { col:'#d9a441', jname:'爆遁', spd:2.2, maxB:1, bnc:1, maxM:4 },
  PINK:   { col:'#d4647c', jname:'紅',   spd:1.6, maxB:3, bnc:1, maxM:0 },
  GREEN:  { col:'#5a9e54', jname:'絡繰', spd:0,   maxB:2, bnc:2, maxM:0, rocket:true },
  PURPLE: { col:'#7d5ba6', jname:'夜叉', spd:2.2, maxB:5, bnc:1, maxM:2 },
  WHITE:  { col:'#dcdcdc', jname:'霞',   spd:1.6, maxB:5, bnc:1, maxM:2, invis:true },
  BLACK:  { col:'#23232b', jname:'影',   spd:3.0, maxB:2, bnc:0, maxM:2, rocket:true },
};

// ─── UTILS ───────────────────────────────────────────────────
const PI2 = Math.PI * 2;
const rnd = (a,b) => Math.random()*(b-a)+a;
const rndI = (a,b) => Math.floor(rnd(a,b+1));
const rndC = a => a[Math.floor(Math.random()*a.length)];
const dist = (ax,ay,bx,by) => Math.hypot(bx-ax, by-ay);
const ang = (ax,ay,bx,by) => Math.atan2(by-ay, bx-ax);
const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
const wrapA = a => { while(a>Math.PI)a-=PI2; while(a<-Math.PI)a+=PI2; return a; };
const lerpA = (f,t,s) => { let d=wrapA(t-f); return f+d*s; };
const lerp = (a,b,t) => a+(b-a)*t;

// 漢数字変換（第X幕・残命などの表示用）
function kanjiNum(n){
  const d=['','一','二','三','四','五','六','七','八','九'];
  if(n<=0)return '零';
  if(n<10)return d[n];
  if(n<20)return '十'+d[n%10];
  if(n<100)return d[Math.floor(n/10)]+'十'+d[n%10];
  if(n===100)return '百';
  return ''+n;
}

// ─── INPUT ───────────────────────────────────────────────────
const Input = {
  k:{}, jp:{}, mouse:{x:CW/2,y:CH/2,l:false,r:false,lj:false,rj:false},
  init(cv){
    window.addEventListener('keydown',e=>{
      if(!this.k[e.code]){this.jp[e.code]=true;}
      this.k[e.code]=true;
      if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
    });
    window.addEventListener('keyup',e=>{this.k[e.code]=false;});
    cv.addEventListener('mousemove',e=>{
      const r=cv.getBoundingClientRect();
      this.mouse.x=e.clientX-r.left; this.mouse.y=e.clientY-r.top;
    });
    cv.addEventListener('mousedown',e=>{
      if(e.button===0){this.mouse.l=true;this.mouse.lj=true;}
      if(e.button===2){this.mouse.r=true;this.mouse.rj=true;}
      e.preventDefault();
    });
    cv.addEventListener('mouseup',e=>{
      if(e.button===0)this.mouse.l=false;
      if(e.button===2)this.mouse.r=false;
    });
    cv.addEventListener('contextmenu',e=>e.preventDefault());
  },
  held(c){return!!this.k[c];},
  just(c){return!!this.jp[c];},
  flush(){this.jp={}; this.mouse.lj=false; this.mouse.rj=false;}
};

// ─── AUDIO ───────────────────────────────────────────────────
const Sfx = {
  ctx:null,
  init(){try{this.ctx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}},
  resume(){if(this.ctx?.state==='suspended')this.ctx.resume();},
  play(type){
    if(!this.ctx)return;
    const ctx=this.ctx, now=ctx.currentTime;
    const osc=(f,t,dur,type='square',vol=0.25)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type=type; o.connect(g); g.connect(ctx.destination);
      o.frequency.setValueAtTime(f,now);
      if(t)o.frequency.exponentialRampToValueAtTime(t,now+dur);
      g.gain.setValueAtTime(vol,now);
      g.gain.exponentialRampToValueAtTime(0.001,now+dur);
      o.start(now); o.stop(now+dur);
    };
    const noise=(dur,vol=0.4)=>{
      const n=ctx.sampleRate*dur, buf=ctx.createBuffer(1,n,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
      const s=ctx.createBufferSource(),g=ctx.createGain();
      s.buffer=buf; s.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(vol,now); s.start(now);
    };
    switch(type){
      case 'shoot':  noise(0.06,0.18); osc(1500,650,0.07,'sine',0.12); break; // 手裏剣の風切り
      case 'bounce': osc(1450,880,0.045,'triangle',0.2); break;               // 金属の跳ね
      case 'explode':noise(0.3); break;
      case 'mine':   noise(0.08,0.12); osc(220,140,0.14,'sawtooth',0.15); break; // 爆符を貼る
      case 'clear':
        [587,659,880,988].forEach((f,i)=>{ // 和風ペンタトニック
          const o=ctx.createOscillator(),g=ctx.createGain();
          o.type='triangle'; o.connect(g); g.connect(ctx.destination);
          o.frequency.value=f;
          g.gain.setValueAtTime(0.22,now+i*0.13);
          g.gain.exponentialRampToValueAtTime(0.001,now+i*0.13+0.3);
          o.start(now+i*0.13); o.stop(now+i*0.13+0.3);
        }); break;
    }
  }
};

// ─── FIELD ───────────────────────────────────────────────────
class Field {
  constructor(data){
    this.grid = data.grid.map(r=>[...r]);
    this.rows = this.grid.length;
    this.cols = this.grid[0].length;
  }
  get(c,r){ return(c<0||c>=this.cols||r<0||r>=this.rows)?T.WALL:this.grid[r][c]; }
  set(c,r,v){ if(c>=0&&c<this.cols&&r>=0&&r<this.rows)this.grid[r][c]=v; }
  tileAt(wx,wy){ return this.get(Math.floor((wx-FX)/CS), Math.floor((wy-FY)/CS)); }
  tileRect(c,r){ return{x:FX+c*CS, y:FY+r*CS, w:CS, h:CS}; }

  solidTilesInRect(rx,ry,rw,rh){
    const out=[];
    const c0=Math.floor((rx-FX)/CS), r0=Math.floor((ry-FY)/CS);
    const c1=Math.floor((rx+rw-1-FX)/CS), r1=Math.floor((ry+rh-1-FY)/CS);
    for(let r=r0;r<=r1;r++) for(let c=c0;c<=c1;c++){
      const t=this.get(c,r);
      if(t===T.WALL||t===T.DEST) out.push({c,r,t,...this.tileRect(c,r)});
    }
    return out;
  }

  resolveTank(tank){
    const h=TANK_SZ/2;
    let x=tank.x-h, y=tank.y-h, w=TANK_SZ, hi=TANK_SZ;
    x=clamp(x,FX,FX+FW-w); y=clamp(y,FY,FY+FH-hi);
    for(let iter=0;iter<4;iter++){
      const tiles=this.solidTilesInRect(x,y,w,hi);
      if(!tiles.length)break;
      for(const tile of tiles){
        const ox=Math.min(x+w,tile.x+tile.w)-Math.max(x,tile.x);
        const oy=Math.min(y+hi,tile.y+tile.h)-Math.max(y,tile.y);
        if(ox>0&&oy>0){
          if(ox<oy){x+=(x+w/2<tile.x+tile.w/2)?-ox:ox;}
          else{y+=(y+hi/2<tile.y+tile.h/2)?-oy:oy;}
        }
      }
    }
    tank.x=x+h; tank.y=y+h;
  }

  // destroy=false で「軌道予測用の当たり判定」（障子を破らない）
  bulletHit(bx,by,destroy=true){
    // boundary
    if(bx-BULLET_R<FX) return{nx:1,ny:0};
    if(bx+BULLET_R>FX+FW) return{nx:-1,ny:0};
    if(by-BULLET_R<FY) return{nx:0,ny:1};
    if(by+BULLET_R>FY+FH) return{nx:0,ny:-1};
    // tiles
    const c0=Math.floor((bx-BULLET_R-FX)/CS), r0=Math.floor((by-BULLET_R-FY)/CS);
    const c1=Math.floor((bx+BULLET_R-FX)/CS), r1=Math.floor((by+BULLET_R-FY)/CS);
    for(let r=r0;r<=r1;r++) for(let c=c0;c<=c1;c++){
      const tp=this.get(c,r);
      if(tp===T.WALL||tp===T.DEST){
        const tx=FX+c*CS, ty=FY+r*CS;
        if(bx+BULLET_R>tx&&bx-BULLET_R<tx+CS&&by+BULLET_R>ty&&by-BULLET_R<ty+CS){
          const oL=(bx+BULLET_R)-tx, oR=(tx+CS)-(bx-BULLET_R);
          const oT=(by+BULLET_R)-ty, oB=(ty+CS)-(by-BULLET_R);
          const mH=Math.min(oL,oR), mV=Math.min(oT,oB);
          const nx=mH<=mV?(oL<oR?-1:1):0;
          const ny=mH<=mV?0:(oT<oB?-1:1);
          if(tp===T.DEST&&destroy) this.set(c,r,T.EMPTY);
          return{nx,ny,dest:tp===T.DEST};
        }
      }
    }
    return null;
  }

  draw(ctx){
    for(let r=0;r<this.rows;r++) for(let c=0;c<this.cols;c++){
      const tp=this.get(c,r), x=FX+c*CS, y=FY+r*CS;
      if(tp===T.WALL){
        // 石垣
        ctx.fillStyle='#3d4254'; ctx.fillRect(x,y,CS,CS);
        ctx.fillStyle='#555b70'; ctx.fillRect(x+2,y+2,CS-4,5); ctx.fillRect(x+2,y+2,5,CS-4);
        ctx.fillStyle='#2a2e3c'; ctx.fillRect(x+2,y+CS-7,CS-4,5); ctx.fillRect(x+CS-7,y+2,5,CS-4);
        ctx.strokeStyle=SUMI; ctx.lineWidth=1; ctx.strokeRect(x+0.5,y+0.5,CS-1,CS-1);
      } else if(tp===T.DEST){
        // 障子（破壊可能）
        ctx.fillStyle='#efe6d0'; ctx.fillRect(x,y,CS,CS);
        ctx.strokeStyle='#8a6f4a'; ctx.lineWidth=2; ctx.strokeRect(x+1,y+1,CS-2,CS-2);
        ctx.lineWidth=1; ctx.strokeStyle='rgba(138,111,74,0.7)';
        for(let i=1;i<3;i++){
          ctx.beginPath(); ctx.moveTo(x+i*CS/3,y+2); ctx.lineTo(x+i*CS/3,y+CS-2); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(x+2,y+i*CS/3); ctx.lineTo(x+CS-2,y+i*CS/3); ctx.stroke();
        }
      } else if(tp===T.PIT){
        // 水堀
        ctx.fillStyle='#16263c'; ctx.fillRect(x,y,CS,CS);
        ctx.strokeStyle='rgba(140,180,220,0.25)'; ctx.lineWidth=1;
        const ph=(G.worldT*0.05+(c+r))%1;
        ctx.beginPath(); ctx.arc(x+CS/2,y+CS/2,5+ph*10,0,PI2); ctx.stroke();
        ctx.beginPath(); ctx.arc(x+CS/2,y+CS/2,3+((ph+0.5)%1)*10,0,PI2); ctx.stroke();
      }
    }
  }
}

// ─── EXPLOSION ───────────────────────────────────────────────
class Explosion {
  constructor(x,y,r){
    this.x=x; this.y=y; this.maxR=r; this.timer=35; this.dead=false;
    this.pts=Array.from({length:14},()=>({
      x,y, vx:rnd(-3,3), vy:rnd(-3,3),
      life:rndI(15,35), col:rndC(['#FF4500','#FF8C00','#FFD27D','#FFF'])
    }));
  }
  update(){
    this.timer-=G.ts;
    if(this.timer<=0)this.dead=true;
    this.pts.forEach(p=>{p.x+=p.vx*G.ts;p.y+=p.vy*G.ts;p.life-=G.ts;});
  }
  draw(ctx){
    const p=clamp(1-this.timer/35,0,1), r=this.maxR*p;
    ctx.save();
    ctx.globalAlpha=1-p;
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,Math.max(r,0.1));
    g.addColorStop(0,'#FFF'); g.addColorStop(0.4,'#FFD27D');
    g.addColorStop(0.8,'#FF4500'); g.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(this.x,this.y,Math.max(r,0.1),0,PI2); ctx.fillStyle=g; ctx.fill();
    this.pts.forEach(pt=>{
      if(pt.life<=0)return;
      ctx.globalAlpha=clamp(pt.life/35,0,1);
      ctx.beginPath(); ctx.arc(pt.x,pt.y,3,0,PI2);
      ctx.fillStyle=pt.col; ctx.fill();
    });
    ctx.restore();
  }
}

// ─── SHURIKEN / KUNAI（弾） ───────────────────────────────────
class Bullet {
  constructor(x,y,vx,vy,owner,bounces){
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.owner=owner; this.bounces=bounces; this.dead=false;
    this.trail=[];
    this.rot=Math.random()*PI2;
    this.kunai=!!owner?.rocket; // ロケット系はクナイ（直進・高速）
  }
  update(field,allBullets,allTanks,allMines){
    if(this.dead)return;
    this.x+=this.vx*G.ts; this.y+=this.vy*G.ts;
    this.rot+=(this.kunai?0.06:0.45)*G.ts;
    // wall
    const wh=field.bulletHit(this.x,this.y);
    if(wh){
      if(this.bounces>0){
        const dot=this.vx*wh.nx+this.vy*wh.ny;
        this.vx-=2*dot*wh.nx; this.vy-=2*dot*wh.ny;
        this.bounces--; Sfx.play('bounce');
        // push out
        if(wh.nx)this.x+=wh.nx*BULLET_R*1.5;
        if(wh.ny)this.y+=wh.ny*BULLET_R*1.5;
      } else { this.dead=true; return; }
    }
    // trail
    const lt=this.trail[this.trail.length-1];
    if(!lt||dist(lt.x,lt.y,this.x,this.y)>2.5){
      this.trail.push({x:this.x,y:this.y});
      if(this.trail.length>26)this.trail.shift();
    }
    // bullet vs bullet
    for(const b of allBullets){
      if(b===this||b.dead)continue;
      if(dist(this.x,this.y,b.x,b.y)<BULLET_R*2.2){ this.dead=true; b.dead=true; return; }
    }
    // bullet vs mine
    for(const m of allMines){
      if(m.dead)continue;
      if(dist(this.x,this.y,m.x,m.y)<MINE_R+BULLET_R){ m.explode(allTanks,allMines,field); this.dead=true; return; }
    }
    // bullet vs ninja
    const h=TANK_SZ/2;
    for(const t of allTanks){
      if(t===this.owner||t.dead)continue;
      if(this.x>t.x-h&&this.x<t.x+h&&this.y>t.y-h&&this.y<t.y+h){
        t.hit(this.owner); this.dead=true; return;
      }
    }
  }
  draw(ctx){
    if(this.dead)return;
    const pl=this.owner?.isPlayer;
    const col=pl?(this.owner.bulletCol||'#DCEBFF'):'#FFC46B';
    const glow=pl?(this.owner.bulletGlow||'#7FD4FF'):'#FF9D45';
    ctx.save();
    // trail
    for(let i=1;i<this.trail.length;i++){
      const t0=this.trail[i-1], t1=this.trail[i];
      ctx.globalAlpha=(i/this.trail.length)*0.35;
      ctx.strokeStyle=col; ctx.lineWidth=1+(i/this.trail.length)*2;
      ctx.beginPath(); ctx.moveTo(t0.x,t0.y); ctx.lineTo(t1.x,t1.y); ctx.stroke();
    }
    if(this.trail.length){
      const lt=this.trail[this.trail.length-1];
      ctx.globalAlpha=0.4; ctx.strokeStyle=col; ctx.lineWidth=2.6;
      ctx.beginPath(); ctx.moveTo(lt.x,lt.y); ctx.lineTo(this.x,this.y); ctx.stroke();
    }
    // body
    ctx.globalAlpha=1;
    ctx.translate(this.x,this.y);
    ctx.shadowColor=glow; ctx.shadowBlur=10;
    if(this.kunai){
      // クナイ：刃＋柄＋環
      ctx.rotate(Math.atan2(this.vy,this.vx));
      ctx.fillStyle='#cfd6e0';
      ctx.beginPath(); ctx.moveTo(9,0); ctx.lineTo(-1,-2.8); ctx.lineTo(-1,2.8); ctx.closePath(); ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='#5a4632'; ctx.fillRect(-6,-1.3,5,2.6);
      ctx.beginPath(); ctx.arc(-8,0,2.2,0,PI2);
      ctx.strokeStyle='#cfd6e0'; ctx.lineWidth=1.3; ctx.stroke();
    } else {
      // 手裏剣：回転する四方星
      ctx.rotate(this.rot);
      ctx.fillStyle='#c9ced6';
      ctx.beginPath();
      for(let i=0;i<4;i++){
        const a0=i*Math.PI/2;
        ctx.lineTo(Math.cos(a0)*7.2,Math.sin(a0)*7.2);
        ctx.lineTo(Math.cos(a0+Math.PI/4)*2.6,Math.sin(a0+Math.PI/4)*2.6);
      }
      ctx.closePath(); ctx.fill();
      ctx.shadowBlur=0;
      ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=0.8; ctx.stroke();
      ctx.beginPath(); ctx.arc(0,0,1.5,0,PI2); ctx.fillStyle='#2a2a33'; ctx.fill();
    }
    ctx.restore();
  }
}

// ─── 爆符（地雷） ─────────────────────────────────────────────
class Mine {
  constructor(x,y,owner){
    this.x=x; this.y=y; this.owner=owner; this.timer=MINE_LIFE; this.grace=70;
    this.dead=false; this.blink=0; this.tilt=rnd(-0.45,0.45);
  }
  update(allTanks,allMines,field){
    if(this.dead)return;
    if(this.grace>0){this.grace-=G.ts;return;}
    this.blink+=G.ts;
    this.timer-=G.ts;
    if(this.timer<=0){this.explode(allTanks,allMines,field);return;}
    for(const t of allTanks){
      if(t.dead)continue;
      if(dist(this.x,this.y,t.x,t.y)<MINE_TRIG){this.explode(allTanks,allMines,field);return;}
    }
  }
  explode(allTanks,allMines,field){
    if(this.dead)return; this.dead=true; Sfx.play('explode');
    G.addExplosion(this.x,this.y,MINE_EXPL);
    for(const t of allTanks) if(!t.dead&&dist(this.x,this.y,t.x,t.y)<MINE_EXPL) t.hit(this.owner);
    for(const m of allMines) if(!m.dead&&m!==this&&dist(this.x,this.y,m.x,m.y)<MINE_EXPL) m.explode(allTanks,allMines,field);
    if(field){
      const c0=Math.floor((this.x-MINE_EXPL-FX)/CS), r0=Math.floor((this.y-MINE_EXPL-FY)/CS);
      const c1=Math.floor((this.x+MINE_EXPL-FX)/CS), r1=Math.floor((this.y+MINE_EXPL-FY)/CS);
      for(let r=r0;r<=r1;r++) for(let c=c0;c<=c1;c++){
        if(field.get(c,r)===T.DEST&&dist(this.x,this.y,FX+c*CS+CS/2,FY+r*CS+CS/2)<MINE_EXPL)
          field.set(c,r,T.EMPTY);
      }
    }
  }
  draw(ctx){
    if(this.dead)return;
    const urg=this.timer<150, on=urg?Math.floor(this.blink/4)%2:0;
    ctx.save();
    ctx.translate(this.x,this.y); ctx.rotate(this.tilt);
    ctx.globalAlpha=this.grace>0?0.8:1;
    ctx.fillStyle=on?SHU:WASHI;
    ctx.fillRect(-6,-9,12,18);
    ctx.strokeStyle='#C73E3A'; ctx.lineWidth=1.5; ctx.strokeRect(-6,-9,12,18);
    ctx.fillStyle=on?WASHI:'#C73E3A';
    ctx.font='bold 10px '+FJ; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('爆',0,1);
    ctx.restore();
    ctx.textBaseline='alphabetic';
  }
}

// ─── NINJA BASE（戦車基底クラスに相当） ───────────────────────
class Tank {
  constructor(x,y,angle){
    this.x=x; this.y=y; this.angle=angle; this.tAngle=angle;
    this.dead=false; this.bullets=[]; this.mines=[];
    this.tracks=[]; this.ltkx=x; this.ltky=y;
    this.vx=0; this.vy=0;
    this._ph=Math.random()*PI2; this._fs=false;
  }
  get activeBullets(){ return this.bullets.filter(b=>!b.dead); }
  get activeMines(){ return this.mines.filter(m=>!m.dead); }

  shoot(){
    if(this.activeBullets.length>=this.maxB)return null;
    const spd=this.rocket?BULLET_SPD*1.5:BULLET_SPD;
    const bx=this.x+Math.cos(this.tAngle)*(TANK_SZ/2+BULLET_R+2);
    const by=this.y+Math.sin(this.tAngle)*(TANK_SZ/2+BULLET_R+2);
    const b=new Bullet(bx,by,Math.cos(this.tAngle)*spd,Math.sin(this.tAngle)*spd,this,this.maxBnc);
    this.bullets.push(b); Sfx.play('shoot'); return b;
  }
  layMine(){
    if(this.maxM===0||this.activeMines.length>=this.maxM)return null;
    const m=new Mine(this.x,this.y,this); this.mines.push(m); Sfx.play('mine'); return m;
  }
  hit(attacker){
    if(this.dead)return; this.dead=true;
    G.addExplosion(this.x,this.y,38); Sfx.play('explode');
    G.onDeath(this,attacker);
  }
  track(){
    if(dist(this.x,this.y,this.ltkx,this.ltky)>9){
      this._fs=!this._fs;
      this.tracks.push({x:this.x,y:this.y,a:this.angle,life:200,s:this._fs});
      if(this.tracks.length>40)this.tracks.shift();
      this.ltkx=this.x; this.ltky=this.y;
    }
  }
  // 足跡（履帯の代わり）。霞は足跡が濃く、唯一の手掛かりになる
  drawTracks(ctx){
    const boost=this.trackBoost||1;
    for(const t of this.tracks){
      if(--t.life<=0)continue;
      const o=t.s?4:-4;
      const px=t.x+Math.cos(t.a+Math.PI/2)*o;
      const py=t.y+Math.sin(t.a+Math.PI/2)*o;
      ctx.save();
      ctx.globalAlpha=(t.life/200)*0.30*boost;
      ctx.fillStyle='rgba(200,190,170,0.8)';
      ctx.beginPath(); ctx.ellipse(px,py,1.7,3.0,t.a,0,PI2); ctx.fill();
      ctx.restore();
    }
  }
  // 忍者の描画：体は移動方向、目線と利き腕は照準方向
  drawBody(ctx,col,alpha=1){
    const r=TANK_SZ/2-2;
    const moving=Math.abs(this.vx)+Math.abs(this.vy)>0.01;
    const wob=Math.sin(G.worldT*0.25+this._ph)*(moving?1.6:0.6);
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.translate(this.x,this.y);
    // 属性のオーラ（淡く脈動する光輪）
    if(this.auraCol){
      if(!this._auraRgb)this._auraRgb=hexToRgb(this.auraCol);
      const aw=this.auraAlpha||0.2;
      const ar=r+9+Math.sin(G.frame*0.06+this._ph)*2.5;
      const {r:cr,g:cg,b:cb}=this._auraRgb;
      const ag=ctx.createRadialGradient(0,0,r*0.45,0,0,ar);
      ag.addColorStop(0,`rgba(${cr},${cg},${cb},0)`);
      ag.addColorStop(0.55,`rgba(${cr},${cg},${cb},${aw})`);
      ag.addColorStop(1,`rgba(${cr},${cg},${cb},0)`);
      ctx.beginPath(); ctx.arc(0,0,ar,0,PI2); ctx.fillStyle=ag; ctx.fill();
    }
    // 襟巻（体の後方へなびく。時が止まると静止する）
    ctx.save(); ctx.rotate(this.angle+Math.PI);
    ctx.fillStyle=this.scarfCol||'rgba(20,20,30,0.9)';
    ctx.beginPath();
    ctx.moveTo(4,-3);
    ctx.quadraticCurveTo(14,-2+wob,24,-4+wob*2);
    ctx.lineTo(22,2+wob*2);
    ctx.quadraticCurveTo(13,4+wob,4,3);
    ctx.closePath(); ctx.fill();
    ctx.restore();
    // 装束（体）
    ctx.beginPath(); ctx.arc(0,0,r,0,PI2);
    ctx.fillStyle=col; ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle='rgba(8,8,14,0.75)'; ctx.stroke();
    // 頭巾の陰
    ctx.beginPath(); ctx.arc(-Math.cos(this.tAngle)*3,-Math.sin(this.tAngle)*3,r-3,0,PI2);
    ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.fill();
    // 照準方向の目元と利き腕
    ctx.save(); ctx.rotate(this.tAngle);
    ctx.fillStyle='#D9B48F';
    ctx.fillRect(r-9,-5,7,10);
    ctx.fillStyle=this.eyeCol||'#1c1c24';
    ctx.fillRect(r-7,-3.6,3,2.6); ctx.fillRect(r-7,1,3,2.6);
    // 手元の手裏剣（時が流れている間だけ回る）
    ctx.translate(r+1,6); ctx.rotate(G.worldT*0.3+this._ph);
    ctx.fillStyle='#c9ced6';
    for(let i=0;i<4;i++){
      ctx.rotate(Math.PI/2);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(4.5,1.2); ctx.lineTo(4.5,-1.2); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
    ctx.restore();
  }
}

// ─── PLAYER NINJA ────────────────────────────────────────────
// プレイヤーは常に等速。世界（刺客・手裏剣・爆符）だけが G.ts でスローになる。
class PlayerTank extends Tank {
  constructor(x,y,pNum){
    super(x,y,0);
    this.pNum=pNum; this.isPlayer=true;
    this.spd=PLAYER_SPEED; this.maxB=5; this.maxBnc=1; this.maxM=2;
    if(pNum===1){
      // 一人目は選んだ流派の装束とオーラをまとう
      const e=GOTON[G.element]||GOTON.FIRE;
      this.col=e.garb; this.scarfCol=e.col; this.kanji=e.kanji;
      this.markerCol=e.glow; this.bulletCol=e.bullet; this.bulletGlow=e.glow;
      this.auraCol=e.col; this.auraAlpha=0.32;
    } else {
      this.col='#A8374A'; this.scarfCol=WASHI; this.kanji='朱';
      this.markerCol='#FFB3A0'; this.bulletCol='#FFC9B8'; this.bulletGlow='#FF8A70';
      this.auraCol='#D85A6E'; this.auraAlpha=0.32;
    }
    this.sCool=0; this.rocket=false;
    this.p2ta=0; // p2 aim angle
  }
  update(field){
    if(this.dead)return;
    let dx=0,dy=0;
    const p=this.pNum;
    if(p===1){
      if(Input.held('KeyW'))dy=-1; if(Input.held('KeyS'))dy=1;
      if(Input.held('KeyA'))dx=-1; if(Input.held('KeyD'))dx=1;
    } else {
      if(Input.held('ArrowUp'))dy=-1; if(Input.held('ArrowDown'))dy=1;
      if(Input.held('ArrowLeft'))dx=-1; if(Input.held('ArrowRight'))dx=1;
    }
    if(dx||dy){
      const l=Math.hypot(dx,dy); dx/=l; dy/=l;
      this.angle=Math.atan2(dy,dx);
      this.vx=dx*this.spd; this.vy=dy*this.spd;
      this.x+=this.vx; this.y+=this.vy;
      field.resolveTank(this); this.track();
    } else { this.vx=0; this.vy=0; }
    // aim
    if(p===1){
      this.tAngle=ang(this.x,this.y,Input.mouse.x,Input.mouse.y);
    } else {
      if(Input.held('Comma'))this.p2ta-=0.05;
      if(Input.held('Period'))this.p2ta+=0.05;
      this.tAngle=this.p2ta;
    }
    if(this.sCool>0)this.sCool--;
    // 手裏剣（放つと少し時間が進む）
    const sh=(p===1&&Input.mouse.lj)||(p===2&&(Input.just('Slash')||Input.just('Enter')));
    if(sh&&this.sCool===0&&this.shoot()){this.sCool=8; G.shootPulse=14;}
    // 爆符
    const mn=(p===1&&(Input.just('Space')||Input.mouse.rj))||(p===2&&(Input.just('ShiftRight')||Input.just('ShiftLeft')));
    if(mn&&this.layMine())G.shootPulse=Math.max(G.shootPulse,8);
  }
  draw(ctx){
    if(this.dead)return;
    this.drawTracks(ctx); this.drawBody(ctx,this.col);
    ctx.save();
    ctx.fillStyle=this.markerCol;
    ctx.font='bold 11px '+FJ; ctx.textAlign='center';
    ctx.fillText(this.kanji,this.x,this.y-19);
    ctx.restore();
  }
}

// ─── ENEMY AI ─────────────────────────────────────────────────
// すべての移動量・タイマー・発射確率を G.ts でスケールする（タンク版と同一ロジック）
const AI = {
  nearest(tank,targets){ let n=null,d=Infinity; for(const t of targets){if(t.dead)continue;const dd=dist(tank.x,tank.y,t.x,t.y);if(dd<d){d=dd;n=t;}}return n; },
  los(tank,target,field){
    if(!target)return false;
    const steps=32;
    for(let i=1;i<steps;i++){
      const x=lerp(tank.x,target.x,i/steps), y=lerp(tank.y,target.y,i/steps);
      const tp=field.tileAt(x,y);
      if(tp===T.WALL||tp===T.DEST)return false;
    }
    return true;
  },
  rndMove(tank,field){
    if(!(tank._mt>0)){tank._md=Math.random()*PI2;tank._mt=rndI(40,140);}
    tank._mt-=G.ts;
    const px=tank.x,py=tank.y;
    tank.x+=Math.cos(tank._md)*tank.spd*G.ts; tank.y+=Math.sin(tank._md)*tank.spd*G.ts;
    field.resolveTank(tank);
    if(Math.abs(tank.x-px)<0.1*G.ts&&Math.abs(tank.y-py)<0.1*G.ts){tank._md=Math.random()*PI2;tank._mt=0;}
    tank.angle=tank._md; tank.track();
  },
  chaseMove(tank,target,field){
    if(!target){AI.rndMove(tank,field);return;}
    const a=ang(tank.x,tank.y,target.x,target.y);
    tank.x+=Math.cos(a)*tank.spd*G.ts; tank.y+=Math.sin(a)*tank.spd*G.ts;
    field.resolveTank(tank); tank.angle=a; tank.track();
  },
  fleeMove(tank,threat,field){
    const a=ang(threat.x,threat.y,tank.x,tank.y)+rnd(-0.4,0.4);
    tank.x+=Math.cos(a)*tank.spd*G.ts; tank.y+=Math.sin(a)*tank.spd*G.ts;
    field.resolveTank(tank); tank.angle=a; tank.track();
  },
  aimAt(tank,target,rate=0.05){
    if(!target)return;
    tank.tAngle=lerpA(tank.tAngle,ang(tank.x,tank.y,target.x,target.y),rate*G.ts);
  },
  tryShoot(tank,target,field,prob,cd){
    if(!(tank._st>0)&&Math.random()<prob*G.ts&&AI.los(tank,target,field)){tank.shoot();tank._st=cd;}
    if(tank._st>0)tank._st-=G.ts;
  },
  // ricochet angle search
  calcRicochet(tank,target,field,maxBnc){
    for(let i=0;i<48;i++){
      const a=(i/48)*PI2;
      if(AI.simBullet(
        tank.x+Math.cos(a)*(TANK_SZ/2+BULLET_R+2),
        tank.y+Math.sin(a)*(TANK_SZ/2+BULLET_R+2),
        Math.cos(a)*BULLET_SPD, Math.sin(a)*BULLET_SPD,
        maxBnc, field, target
      ))return a;
    }
    return null;
  },
  simBullet(x,y,vx,vy,bnc,field,target){
    let bx=x,by=y,bvx=vx,bvy=vy,b=bnc;
    const h=TANK_SZ/2;
    for(let s=0;s<300;s++){
      bx+=bvx; by+=bvy;
      if(bx>target.x-h&&bx<target.x+h&&by>target.y-h&&by<target.y+h)return true;
      const wh=field.bulletHit(bx,by,false);
      if(wh){
        if(b<=0)return false;
        const dot=bvx*wh.nx+bvy*wh.ny;
        bvx-=2*dot*wh.nx; bvy-=2*dot*wh.ny; b--;
        if(wh.nx)bx+=wh.nx*BULLET_R*1.5; if(wh.ny)by+=wh.ny*BULLET_R*1.5;
      }
      if(bx<FX||bx>FX+FW||by<FY||by>FY+FH)return false;
    }
    return false;
  },

  brown(tank,targets,field){
    if(!tank._rt)tank._rt=1;
    tank.tAngle+=0.018*tank._rt*G.ts;
    if(Math.random()<0.006*G.ts)tank._rt*=-1;
    if(!(tank._st>0)&&Math.random()<0.012*G.ts){
      const t=AI.nearest(tank,targets);
      if(t&&AI.los(tank,t,field)){tank.tAngle=ang(tank.x,tank.y,t.x,t.y);tank.shoot();tank._st=100;}
    }
    if(tank._st>0)tank._st-=G.ts;
  },
  grey(tank,targets,field){
    AI.rndMove(tank,field);
    const t=AI.nearest(tank,targets);
    AI.aimAt(tank,t,0.022); AI.tryShoot(tank,t,field,0.009,85);
  },
  teal(tank,targets,field){
    // defensive: stay away from bullets
    let fled=false;
    for(const bul of G.allBullets){
      if(bul.dead)continue;
      if(dist(tank.x,tank.y,bul.x,bul.y)<80){
        AI.fleeMove(tank,bul,field); fled=true; break;
      }
    }
    if(!fled)AI.rndMove(tank,field);
    const t=AI.nearest(tank,targets);
    AI.aimAt(tank,t,0.06); AI.tryShoot(tank,t,field,0.015,110);
  },
  yellow(tank,targets,field){
    AI.rndMove(tank,field);
    // avoid own mines
    for(const m of tank.activeMines){
      if(dist(tank.x,tank.y,m.x,m.y)<55){AI.fleeMove(tank,m,field);}
    }
    if(Math.random()<0.014*G.ts&&tank.activeMines.length<tank.maxM){
      let ok=true;
      for(const m of tank.activeMines)if(dist(tank.x,tank.y,m.x,m.y)<50)ok=false;
      if(ok)tank.layMine();
    }
    const t=AI.nearest(tank,targets);
    AI.aimAt(tank,t,0.2);
    AI.tryShoot(tank,t,field,0.005,100);
  },
  pink(tank,targets,field){
    const t=AI.nearest(tank,targets);
    t?AI.chaseMove(tank,t,field):AI.rndMove(tank,field);
    AI.aimAt(tank,t,0.07); AI.tryShoot(tank,t,field,0.022,40);
  },
  green(tank,targets,field){
    const t=AI.nearest(tank,targets);
    if(!t)return;
    if(!(tank._st>0)&&Math.random()<G.ts){
      const a=AI.calcRicochet(tank,t,field,2);
      if(a!==null){tank.tAngle=a;tank.shoot();tank._st=80;}
      else tank.tAngle+=0.015;
    }
    if(tank._st>0)tank._st-=G.ts;
  },
  purple(tank,targets,field){
    AI.rndMove(tank,field);
    const t=AI.nearest(tank,targets);
    if(t&&Math.random()<0.25)AI.chaseMove(tank,t,field);
    if(!(tank._st>0)&&Math.random()<0.02*G.ts){
      const a=AI.calcRicochet(tank,t,field,1);
      if(a!==null)tank.tAngle=a;
      else if(t)tank.tAngle=ang(tank.x,tank.y,t.x,t.y);
      tank.shoot(); tank._st=55;
    }
    if(tank._st>0)tank._st-=G.ts;
    if(Math.random()<0.008*G.ts&&tank.activeMines.length<tank.maxM)tank.layMine();
  },
  white(tank,targets,field){
    if(tank._invTimer>0){tank._invTimer-=G.ts;tank.invisible=true;}
    else{tank.invisible=false;}
    AI.rndMove(tank,field);
    const t=AI.nearest(tank,targets);
    AI.aimAt(tank,t,0.05); AI.tryShoot(tank,t,field,0.018,50);
    if(Math.random()<0.007*G.ts&&tank.activeMines.length<tank.maxM)tank.layMine();
  },
  black(tank,targets,field){
    const t=AI.nearest(tank,targets);
    // flee bullets
    let fled=false;
    for(const bul of G.allBullets){
      if(bul.dead||bul.owner===tank)continue;
      if(dist(tank.x,tank.y,bul.x,bul.y)<100){AI.fleeMove(tank,bul,field);fled=true;break;}
    }
    if(!fled)AI.rndMove(tank,field);
    if(t){
      // predictive aim
      const d=dist(tank.x,tank.y,t.x,t.y);
      const tth=d/BULLET_SPD;
      const px=t.x+(t.vx||0)*tth, py=t.y+(t.vy||0)*tth;
      tank.tAngle=lerpA(tank.tAngle,ang(tank.x,tank.y,px,py),0.09*G.ts);
    }
    AI.tryShoot(tank,t,field,0.025,42);
    if(Math.random()<0.007*G.ts&&tank.activeMines.length<tank.maxM)tank.layMine();
  },
};

// ─── ENEMY NINJA ──────────────────────────────────────────────
class EnemyTank extends Tank {
  constructor(x,y,angle,type){
    super(x,y,angle);
    this.type=type; this.isPlayer=false;
    const sp=ETYPES[type];
    this.spd=sp.spd; this.maxB=sp.maxB; this.maxBnc=sp.bnc;
    this.maxM=sp.maxM; this.col=sp.col; this.rocket=!!sp.rocket;
    this.scarfCol='rgba(15,15,22,0.85)';
    this.auraCol=sp.col; this.auraAlpha=0.18;
    if(type==='BLACK'){this.eyeCol='#FF4A3F';this.scarfCol='#5a1f1f';this.auraCol='#8E2438';this.auraAlpha=0.26;}
    if(type==='WHITE'){this.trackBoost=1.8;this.auraCol='#D8DBE4';} // 霞は足跡が濃い
    this._mt=0; this._md=Math.random()*PI2; this._st=rndI(20,80); this._rt=1;
    this.invisible=false;
    if(type==='WHITE')this._invTimer=240;
  }
  update(targets,field){
    if(this.dead)return;
    AI[this.type.toLowerCase()](this,targets,field);
  }
  draw(ctx){
    if(this.dead)return;
    this.drawTracks(ctx);
    const alpha=(this.type==='WHITE'&&this.invisible)?0.10:1;
    this.drawBody(ctx,this.col,alpha);
  }
}

// ─── MISSION DATA ─────────────────────────────────────────────
// Grid rows: each row is COLS=20 wide, ROWS=15 rows total
// 0=empty 1=wall 2=destructible 3=pit
function makeGrid(rows){ return rows.map(r=>{ const a=[...r]; while(a.length<COLS)a.push(0); return a; }); }

const MISSIONS = [];

// Helper to generate random missions
function genMission(num){
  const bases=[0,1,2];
  const base=JSON.parse(JSON.stringify(MISSIONS[bases[num%3]]));
  base.enemies=genEnemies(num, base.grid);
  return base;
}
function genEnemies(num, grid){
  const pool=['BROWN'];
  if(num>=2)pool.push('GREY');
  if(num>=5)pool.push('TEAL');
  if(num>=8)pool.push('YELLOW');
  if(num>=10)pool.push('PINK');
  if(num>=12)pool.push('GREEN');
  if(num>=15)pool.push('PURPLE');
  if(num>=20)pool.push('WHITE');
  if(num>=50)pool.push('BLACK');
  const count=clamp(3+Math.floor(num/4),3,12);
  // 空きマスだけを候補にする（壁・障子・穴の中には湧かせない）
  // プレイヤーの初期位置の周辺も外す
  const spots=[];
  for(let r=1;r<ROWS-1;r++)for(let c=1;c<COLS-1;c++){
    if(grid[r][c]!==T.EMPTY)continue;
    if(Math.abs(c-2)+Math.abs(r-7)<5)continue;
    if(Math.abs(c-17)+Math.abs(r-7)<5)continue;
    spots.push({c,r});
  }
  const out=[];
  for(let i=0;i<count&&spots.length;i++){
    const s=spots.splice(rndI(0,spots.length-1),1)[0]; // 同じマスに重ねない
    const type=pool[rndI(Math.max(0,pool.length-3),pool.length-1)];
    out.push({type,col:s.c,row:s.r,angle:Math.random()*PI2});
  }
  return out;
}

// ── Mission 1
MISSIONS.push({
  grid:makeGrid([

function getMission(num){
  const idx=num-1;
  if(idx<0)return MISSIONS[0];
  if(num<=20||num%10===0){
    if(MISSIONS[idx])return MISSIONS[idx];
    const m=genMission(num);
    MISSIONS[idx]=m; return m;
  }
  return genMission(num);
}

// ─── GAME ─────────────────────────────────────────────────────
const G = {
  cv:null, ctx:null, state:ST.TITLE,
  mode:'1p', mission:1, lives:3, score:0, p2Score:0,
  p1:null, p2:null, enemies:[], allBullets:[], allMines:[],
  explosions:[], field:null,
  clearT:0, overT:0, startT:0, titleSel:0,
  frame:0,
  element:'FIRE', elemSel:0,
  ts:1,           // 時間係数: 動くとTS_MAXへ、止まるとMIN_TSへ
  shootPulse:0,   // 手裏剣を放った直後は少しだけ時間が進む
  worldT:0,       // 世界時間（演出用。時間停止中は進まない）

  init(cv){
    this.cv=cv; this.ctx=cv.getContext('2d');
    try{const s=localStorage.getItem('shinobi_elem'); if(s&&GOTON[s])this.element=s;}catch(e){}
    this.elemSel=Math.max(0,ELEM_KEYS.indexOf(this.element));
    this._elemPos=this.elemSel;
    Input.init(cv); Sfx.init(); this.loop();
  },
  loop(){
    requestAnimationFrame(()=>this.loop());
    this.frame++;
    Sfx.resume();
    this.update(); this.render(); Input.flush();
  },
  update(){
    switch(this.state){
      case ST.TITLE:  this.uTitle(); break;
      case ST.PLAY:   this.uPlay(); break;
      case ST.PAUSE:  this.uPause(); break;
      case ST.CLEAR:  this.uClear(); break;
      case ST.OVER:   this.uOver(); break;
      case ST.RESULT: this.uResult(); break;
    }
  },

  uTitle(){
    if(Input.just('ArrowUp')||Input.just('KeyW')||Input.just('ArrowDown')||Input.just('KeyS'))this.titleSel=1-this.titleSel;
    if(Input.just('ArrowLeft')||Input.just('KeyA')){this.elemSel=(this.elemSel+4)%5;this.applyElem();}
    if(Input.just('ArrowRight')||Input.just('KeyD')){this.elemSel=(this.elemSel+1)%5;this.applyElem();}
    if(Input.just('Enter')||Input.just('Space'))this.startGame(this.titleSel===0?'1p':'2p');
  },

  // ホームで流派を直接切り替える（即保存）
  applyElem(){
    this.element=ELEM_KEYS[this.elemSel];
    try{localStorage.setItem('shinobi_elem',this.element);}catch(e){}
    this._elemFlash=14;
    Sfx.play('bounce');
  },

  startGame(mode){
    this.mode=mode; this.mission=1; this.lives=3; this.score=0; this.p2Score=0;
    this.loadMission(1); this.state=ST.PLAY; this.startT=120;
  },

  loadMission(num){
    const data=getMission(num);
    this.field=new Field(data);
    this.allBullets=[]; this.allMines=[]; this.explosions=[]; this.enemies=[];
    const ps=data.playerSpawn;
    this.p1=new PlayerTank(FX+ps.col*CS+CS/2, FY+ps.row*CS+CS/2, 1);
    if(this.mode==='2p'){
      const p2s=data.player2Spawn||{col:17,row:7};
      this.p2=new PlayerTank(FX+p2s.col*CS+CS/2, FY+p2s.row*CS+CS/2, 2);
    }
    for(const e of data.enemies){
      this.enemies.push(new EnemyTank(FX+e.col*CS+CS/2, FY+e.row*CS+CS/2, e.angle, e.type));
    }
    this.startT=120;
    this.ts=MIN_TS; this.shootPulse=0;
  },

  uPlay(){
    if(this.startT>0){this.startT--;return;}
    if(Input.just('Escape')||Input.just('KeyP')){this.state=ST.PAUSE;return;}
    // ── timestop: 移動入力中だけ時間が流れる
    let tgt=MIN_TS;
    const p1m=this.p1&&!this.p1.dead&&(Input.held('KeyW')||Input.held('KeyA')||Input.held('KeyS')||Input.held('KeyD'));
    const p2m=this.mode==='2p'&&this.p2&&!this.p2.dead&&(Input.held('ArrowUp')||Input.held('ArrowDown')||Input.held('ArrowLeft')||Input.held('ArrowRight'));
    if(p1m||p2m)tgt=TS_MAX;
    if(this.shootPulse>0){this.shootPulse--; tgt=Math.max(tgt,0.5);}
    this.ts=lerp(this.ts,tgt,tgt>this.ts?0.22:0.10);
    this.worldT+=this.ts;
    const targets=[];
    if(this.p1&&!this.p1.dead)targets.push(this.p1);
    if(this.p2&&!this.p2.dead)targets.push(this.p2);
    if(this.p1)this.p1.update(this.field);
    if(this.p2)this.p2.update(this.field);
    for(const e of this.enemies)if(!e.dead)e.update(targets,this.field);
    // collect all bullets/mines
    this.allBullets=[]; this.allMines=[];
    const all=[...this.enemies];
    if(this.p1)all.push(this.p1);
    if(this.p2)all.push(this.p2);
    for(const t of all){this.allBullets.push(...t.bullets);this.allMines.push(...t.mines);}
    for(const b of this.allBullets)b.update(this.field,this.allBullets,all,this.allMines);
    for(const m of this.allMines)m.update(all,this.allMines,this.field);
    for(const e of this.explosions)e.update();
    this.explosions=this.explosions.filter(e=>!e.dead);
    for(const t of all){t.bullets=t.bullets.filter(b=>!b.dead);t.mines=t.mines.filter(m=>!m.dead);}
    // win check
    if(this.enemies.every(e=>e.dead)){
      Sfx.play('clear'); this.state=ST.CLEAR; this.clearT=120; return;
    }
    // lose check
    const p1d=!this.p1||this.p1.dead;
    const p2d=this.mode==='1p'||!this.p2||this.p2.dead;
    if(p1d&&p2d){
      if(this.mode==='1p'){
        this.lives--;
        if(this.lives<0){this.state=ST.OVER;this.overT=200;}
        else{this.loadMission(this.mission);}
      } else {
        // both dead in 2p
        this.state=ST.RESULT;
      }
    }
  },

  uPause(){
    if(Input.just('Escape')||Input.just('KeyP'))this.state=ST.PLAY;
  },

  uClear(){
    if(--this.clearT<=0){
      this.mission++;
      if(this.mission%5===1&&this.mission>1)this.lives++;
      const max=this.mode==='2p'?20:100;
      if(this.mission>max){
        this.state=this.mode==='2p'?ST.RESULT:ST.OVER; this.overT=200;
      } else {
        this.loadMission(this.mission); this.state=ST.PLAY;
      }
    }
  },

  uOver(){
    if(--this.overT<=0||Input.just('Space')||Input.just('Enter'))this.state=ST.TITLE;
  },
  uResult(){
    if(Input.just('Space')||Input.just('Enter'))this.state=ST.TITLE;
  },

  onDeath(tank,killer){
    if(!tank.isPlayer){
      if(killer===this.p1)this.score++;
      if(killer===this.p2)this.p2Score++;
    }
  },
  addExplosion(x,y,r){ this.explosions.push(new Explosion(x,y,r)); },

  // ── RENDER ──────────────────────────────────────────────────
  render(){
    const ctx=this.ctx;
    ctx.clearRect(0,0,CW,CH);
    switch(this.state){
      case ST.TITLE:  this.rTitle(ctx); break;
      case ST.PLAY:
      case ST.PAUSE:
      case ST.CLEAR:  this.rGame(ctx);
        if(this.state===ST.PAUSE)this.rPause(ctx);
        if(this.state===ST.CLEAR)this.rClear(ctx);
        break;
      case ST.OVER:   this.rOver(ctx); break;
      case ST.RESULT: this.rResult(ctx); break;
    }
  },

  // 朱印（ハンコ）を描く共通関数
  rSeal(ctx,x,y,size,chars,rot=0.06){
    ctx.save();
    ctx.translate(x,y); ctx.rotate(rot);
    ctx.fillStyle='rgba(199,62,58,0.92)';
    ctx.fillRect(-size/2,-size/2,size,size);
    ctx.strokeStyle='rgba(120,30,28,0.9)'; ctx.lineWidth=2;
    ctx.strokeRect(-size/2+3,-size/2+3,size-6,size-6);
    ctx.fillStyle=WASHI;
    const fs=Math.floor(size*0.38);
    ctx.font='bold '+fs+'px '+FJ; ctx.textAlign='center'; ctx.textBaseline='middle';
    if(chars.length===1){ ctx.fillText(chars,0,1); }
    else{
      ctx.fillText(chars[0],0,-size*0.2);
      ctx.fillText(chars[1],0,size*0.22);
    }
    ctx.restore();
    ctx.textBaseline='alphabetic';
  },

  // 遠景の城（シルエット）
  rCastle(ctx,bx,by){
    ctx.save(); ctx.translate(bx,by);
    ctx.fillStyle='#0c0e1f';
    // 石垣
    ctx.beginPath();
    ctx.moveTo(-95,150); ctx.lineTo(-70,96); ctx.lineTo(70,96); ctx.lineTo(95,150); ctx.closePath(); ctx.fill();
    // 層（壁＋反り屋根）
    const tier=(w,yTop,h)=>{
      ctx.fillRect(-w/2,yTop,w,h);
      ctx.beginPath();
      ctx.moveTo(-w/2-16,yTop);
      ctx.quadraticCurveTo(-w/4,yTop-7,0,yTop-21);
      ctx.quadraticCurveTo(w/4,yTop-7,w/2+16,yTop);
      ctx.closePath(); ctx.fill();
    };
    tier(120,40,56);
    tier(90,-4,34);
    tier(62,-42,30);
    // 鯱
    ctx.fillRect(-2,-72,4,10);
    // 灯（瞬く窓明かり）
    const win=(x,y,ph)=>{
      ctx.fillStyle=`rgba(255,196,107,${(0.35+0.3*Math.sin(this.frame*0.04+ph)).toFixed(2)})`;
      ctx.fillRect(x,y,4,5);

    win(-22,58,0); win(14,62,2.1); win(-8,8,4.2); win(6,-30,1.3);
    ctx.restore();

  // 右下の屋根と忍のシルエット
  rRoofNinja(ctx){
    ctx.save();
    const bx=CW-150, by=CH-86;
    ctx.fillStyle='#0c0e1f';
    ctx.beginPath();
    ctx.moveTo(CW-330,CH);
    ctx.quadraticCurveTo(CW-260,by+10,bx-60,by+18);

    // 忍（しゃがみ姿勢）
    const nx=bx+14, ny=by+10;

  rFrozenStars(ctx){

      s.rot+=s.v; // 止まった時の中で、ごくゆっくり回り続ける
      const tx=s.x+Math.cos(s.ta)*s.tl, ty=s.y+Math.sin(s.ta)*s.tl;

    // 星（瞬く）
    for(let i=0;i<80;i++){
      const sx=(i*131.7)%CW, sy=(i*89.3)%(CH*0.7);
      const tw=0.25+0.25*Math.sin(this.frame*0.02+i*1.7);
      ctx.fillStyle=`rgba(255,255,255,${tw.toFixed(3)})`;
      ctx.fillRect(sx,sy,i%3===0?2:1,i%3===0?2:1);
    }
    // ── 流派の気配（背景全体が選んだ属性の色に染まる）
    const ce=GOTON[this.element]||GOTON.FIRE;
    const tcT=hexToRgb(ce.col);
    if(!this._amb)this._amb={...tcT};
    this._amb.r=lerp(this._amb.r,tcT.r,0.06);
    this._amb.g=lerp(this._amb.g,tcT.g,0.06);
    this._amb.b=lerp(this._amb.b,tcT.b,0.06);
    const A=al=>`rgba(${this._amb.r|0},${this._amb.g|0},${this._amb.b|0},${al})`;
    const ambT=ctx.createRadialGradient(CW/2,300,40,CW/2,300,540);
    ambT.addColorStop(0,A(0.13)); ambT.addColorStop(1,A(0));
    ctx.fillStyle=ambT; ctx.fillRect(0,0,CW,CH);
    // ── 月と暈、流れる雲
    ctx.save();
    const mx=CW-160,my=120;
    const halo=ctx.createRadialGradient(mx,my,40,mx,my,155);
    halo.addColorStop(0,'rgba(245,233,201,0.20)'); halo.addColorStop(1,'rgba(245,233,201,0)');
    ctx.fillStyle=halo; ctx.fillRect(mx-160,my-160,320,320);
    ctx.shadowColor='#F5E9C9'; ctx.shadowBlur=60;
    ctx.fillStyle='#F3E7C5';
    ctx.beginPath(); ctx.arc(mx,my,62,0,PI2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(205,190,155,0.3)';
    ctx.beginPath(); ctx.arc(mx+18,my-14,9,0,PI2); ctx.fill();
    ctx.beginPath(); ctx.arc(mx-22,my+18,6,0,PI2); ctx.fill();
    ctx.beginPath(); ctx.arc(mx+6,my+28,4,0,PI2); ctx.fill();
    const cx1=(this.frame*0.12)%(CW+360)-180;
    ctx.fillStyle='rgba(8,10,26,0.6)';
    ctx.beginPath(); ctx.ellipse(cx1,my+24,110,13,0.04,0,PI2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(((cx1+CW*0.6)%(CW+360))-180,my-22,80,10,-0.03,0,PI2); ctx.fill();
    ctx.restore();
    // ── 遠景
    this.rCastle(ctx, 130, CH-150);
    this.rRoofNinja(ctx);
    // 流れる霞
    ctx.fillStyle='rgba(180,190,220,0.045)';
    const fx=(this.frame*0.2)%(CW+500)-250;
    ctx.beginPath(); ctx.ellipse(fx,CH-200,240,18,0,0,PI2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(CW-fx,CH-120,300,22,0,0,PI2); ctx.fill();
    // ── 円相（筆の円）
    ctx.save();
    ctx.translate(CW/2,212); ctx.rotate(this.frame*0.0006);
    ctx.strokeStyle=A(0.45); ctx.lineCap='round';
    ctx.lineWidth=9;
    ctx.beginPath(); ctx.arc(0,0,132,0.45,PI2-0.25); ctx.stroke();
    ctx.lineWidth=2.5; ctx.strokeStyle=A(0.62);
    ctx.beginPath(); ctx.arc(0,0,138,0.7,PI2-0.5); ctx.stroke();
    ctx.restore();
    // ── 宙に止まった手裏剣
    this.rFrozenStars(ctx);
    // ── 題字「忍」（淡く呼吸する光）
    ctx.save();
    ctx.font='bold 175px '+FJ; ctx.textAlign='center';
    ctx.shadowColor=`rgba(245,233,201,${(0.35+0.15*Math.sin(this.frame*0.03)).toFixed(3)})`;
    ctx.shadowBlur=26;
    ctx.fillStyle=WASHI;
    ctx.fillText('忍', CW/2, 275);
    ctx.shadowBlur=0;
    ctx.restore();
    // 朱印「刹那」
    this.rSeal(ctx, CW/2+152, 262, 60, '刹那', 0.08);
    // 副題
    ctx.save();
    ctx.font='19px '+FJ; ctx.textAlign='center'; ctx.fillStyle='#CFC5AC';
    ctx.fillText('― 月下に、時を止める ―', CW/2, 342);
    ctx.font='11px Arial'; ctx.fillStyle='#5a5a6e';
    ctx.fillText('S H I N O B I   ·   T I M E S T O P', CW/2, 366);
    ctx.restore();
    // ── 五遁の輪（ホームで直接選ぶ回転式カルーセル。選択枠は常に中央）
    const cy=414;
    this._elemPos=this._elemPos??this.elemSel;
    {
      let dp=(this.elemSel-this._elemPos)%5;
      if(dp>2.5)dp-=5; if(dp<-2.5)dp+=5;
      this._elemPos=((this._elemPos+dp*0.16)%5+5)%5;
    }
    // 中央の光だまり
    const pool=ctx.createRadialGradient(CW/2,cy,8,CW/2,cy,130);
    pool.addColorStop(0,A(0.17)); pool.addColorStop(1,A(0));
    ctx.fillStyle=pool; ctx.fillRect(CW/2-150,cy-95,300,180);
    // 円章（離れるほど小さく半透明＝色の帯が奥へ流れるグラデーション）
    const ring=[];
    ELEM_KEYS.forEach((k,i)=>{
      let d=(i-this._elemPos)%5;
      if(d>2.5)d-=5; if(d<-2.5)d+=5;
      ring.push({k,i,d});
    });
    ring.sort((p,q)=>Math.abs(q.d)-Math.abs(p.d));
    for(const o of ring){
      const g=GOTON[o.k];
      const ad=Math.abs(o.d);
      if(ad>2.4)continue;
      const x=CW/2+o.d*116;
      const sc=Math.max(0.5,1.16-0.26*ad);
      const al=Math.max(0.16,1-0.45*ad);
      const y=cy-(1-Math.min(ad,1))*6;
      const r=36*sc;
      const on=ad<0.5;
      ctx.save();
      ctx.globalAlpha=al;
      ctx.translate(x,y);
      const ra=this.frame*(on?0.006:0.002)+o.i;
      ctx.rotate(ra);
      if(on){ctx.shadowColor=g.glow; ctx.shadowBlur=22;}
      ctx.strokeStyle=g.col; ctx.lineCap='round'; ctx.lineWidth=4*sc;
      ctx.beginPath(); ctx.arc(0,0,r,0.4,PI2-0.2); ctx.stroke();
      ctx.shadowBlur=0;
      ctx.rotate(-ra);
      ctx.fillStyle='rgba(10,12,24,0.88)';
      ctx.beginPath(); ctx.arc(0,0,r-4,0,PI2); ctx.fill();
      ctx.font='bold '+Math.floor(36*sc)+'px '+FJ; ctx.textAlign='center'; ctx.textBaseline='middle';
      if(on){ctx.shadowColor=g.glow; ctx.shadowBlur=16;}
      ctx.fillStyle=on?g.col:'#9a93a8';
      ctx.fillText(g.kanji,0,2);
      ctx.shadowBlur=0; ctx.textBaseline='alphabetic';
      ctx.restore();
    }
    // 切り替えの閃光（テンションの一押し）
    if(this._elemFlash>0){
      this._elemFlash--;
      const fp=1-this._elemFlash/14;
      ctx.save();
      ctx.globalAlpha=(1-fp)*0.8;
      ctx.strokeStyle=ce.col; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(CW/2,cy,40+fp*48,0,PI2); ctx.stroke();
      ctx.restore();
    }
    // 流派の粒子（中央の円章から立ちのぼる）
    this.uElemParts(ctx, CW/2, cy-4);
    // 左右送りの矢
    ctx.save();
    ctx.globalAlpha=0.4+0.25*Math.sin(this.frame*0.07);
    ctx.fillStyle=A(0.95);
    ctx.beginPath(); ctx.moveTo(CW/2-222,cy); ctx.lineTo(CW/2-208,cy-8); ctx.lineTo(CW/2-208,cy+8); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(CW/2+222,cy); ctx.lineTo(CW/2+208,cy-8); ctx.lineTo(CW/2+208,cy+8); ctx.closePath(); ctx.fill();
    ctx.restore();
    // 銘
    ctx.save();
    ctx.font='bold 21px '+FJ; ctx.textAlign='center';
    ctx.fillStyle=ce.col; ctx.shadowColor=ce.glow; ctx.shadowBlur=10;
    ctx.fillText(ce.name, CW/2, cy+70);
    ctx.shadowBlur=0;
    ctx.globalAlpha=0.85;
    ctx.font='12px '+FJ; ctx.fillStyle='#CFC5AC';
    ctx.fillText(ce.desc, CW/2, cy+90);
    ctx.restore();
    // ── 品書き（左右二枚の札）
    const sel=this.titleSel;
    const plX=[CW/2-230,CW/2+10];
    [['単独任務','独りで征く'],['二人任務','二人で挑む']].forEach(([label,cap],i)=>{
      const x=plX[i], y=534, on=sel===i;
      const bob=on?Math.sin(this.frame*0.05)*2:0;
      ctx.save(); ctx.translate(0,bob);
      ctx.fillStyle=on?'rgba(50,30,24,0.92)':'rgba(28,24,30,0.82)';
      ctx.fillRect(x,y,220,56);
      ctx.strokeStyle=on?SHU:'rgba(120,110,95,0.4)';
      ctx.lineWidth=on?2:1;
      ctx.strokeRect(x,y,220,56);
      if(on){
        ctx.strokeStyle='rgba(212,175,55,0.45)'; ctx.lineWidth=1;
        ctx.strokeRect(x+5,y+5,210,46);
        // 回る手裏剣カーソル
        ctx.save();
        ctx.translate(x+26,y+28); ctx.rotate(this.frame*0.04);
        ctx.fillStyle=SHU; ctx.shadowColor=SHU; ctx.shadowBlur=8;
        for(let k=0;k<4;k++){
          ctx.rotate(Math.PI/2);
          ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(8,2); ctx.lineTo(8,-2); ctx.closePath(); ctx.fill();
        }
        ctx.restore();
      }
      ctx.font='bold 22px '+FJ; ctx.textAlign='center';
      ctx.fillStyle=on?WASHI:'#6a6478';
      ctx.fillText(label, x+118, y+26);
      ctx.font='11px '+FJ;
      ctx.fillStyle=on?'rgba(212,175,55,0.85)':'rgba(110,105,120,0.7)';
      ctx.fillText(cap, x+118, y+44);
      ctx.restore();
    });
    // 開始ヒント（明滅）
    ctx.save();
    ctx.globalAlpha=0.45+0.3*Math.sin(this.frame*0.06);
    ctx.font='14px '+FJ; ctx.fillStyle='#CFC5AC'; ctx.textAlign='center';
    ctx.fillText('←→で流派　↑↓で任務　Space・Enterで始める', CW/2, 622);
    ctx.restore();
    // 操作説明
    ctx.font='12px '+FJ; ctx.fillStyle='#4f4b62'; ctx.textAlign='center';
    ctx.fillText('移動 WASD ／ 照準 マウス ／ 手裏剣 左クリック ／ 爆符 右クリック・Space', CW/2, 646);
    ctx.fillText('動けば時が動き、止まれば世界も止まる。', CW/2, 664);
    ctx.textAlign='left';
    // ── 夜桜（最前面）
    this.rPetals(ctx);
  },

  // 選択中の流派の粒子演出（ホームのカルーセルで使用）
  uElemParts(ctx,ox,oy){
    const key=ELEM_KEYS[this.elemSel];
    if(!this._eparts)this._eparts=[];
    const P=this._eparts;
    const n=key==='THUNDER'?(Math.random()<0.2?1:0):2;
    for(let k=0;k<n&&P.length<80;k++){
      if(key==='FIRE')P.push({k:key,x:ox+rnd(-44,44),y:oy+rnd(0,44),vx:rnd(-0.3,0.3),vy:rnd(-1.8,-0.8),l:rndI(36,70),m:70});
      else if(key==='WATER')P.push({k:key,x:ox+rnd(-50,50),y:oy+rnd(20,70),vx:rnd(-0.2,0.2),vy:rnd(-1.0,-0.45),l:rndI(46,86),m:86,r:rnd(1.5,3.5)});
      else if(key==='EARTH')P.push({k:key,x:ox+rnd(-56,56),y:oy+rnd(-44,44),vx:rnd(-0.15,0.15),vy:rnd(-0.2,0.2),l:rndI(60,110),m:110,r:rnd(1.6,4),ro:rnd(0,PI2),vr:rnd(-0.02,0.02)});
      else if(key==='WIND')P.push({k:key,x:ox-150,y:oy+rnd(-62,62),vx:rnd(2.4,3.8),vy:rnd(-0.25,0.25),l:rndI(28,50),m:50});
      else P.push({k:key,x:ox+rnd(-58,58),y:oy+rnd(-58,30),l:8,m:8,seg:[rnd(-10,10),rnd(-10,10),rnd(-10,10)]});
    }
    const e=GOTON[key];
    ctx.save();
    for(let i=P.length-1;i>=0;i--){
      const p=P[i];
      p.l--;
      if(p.l<=0||p.k!==key){P.splice(i,1);continue;}
      const a=p.l/p.m;
      if(p.k==='FIRE'){
        p.x+=p.vx; p.y+=p.vy;
        ctx.globalAlpha=a*(0.6+0.4*Math.sin(this.frame*0.5+p.x));
        ctx.fillStyle=a>0.5?'#FFD27D':e.col;
        ctx.beginPath(); ctx.arc(p.x,p.y,1.2+2.2*a,0,PI2); ctx.fill();
      } else if(p.k==='WATER'){
        p.x+=p.vx+Math.sin(this.frame*0.05+p.y*0.05)*0.2; p.y+=p.vy;
        ctx.globalAlpha=a*0.7;
        ctx.strokeStyle=e.glow; ctx.lineWidth=1.2;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,PI2); ctx.stroke();
        ctx.globalAlpha=a*0.9; ctx.fillStyle='#FFF';
        ctx.fillRect(p.x-p.r*0.4,p.y-p.r*0.5,1,1);
      } else if(p.k==='EARTH'){
        p.x+=p.vx; p.y+=p.vy; p.ro+=p.vr;
        ctx.globalAlpha=a*0.75;
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.ro);
        ctx.fillStyle=e.col;
        ctx.fillRect(-p.r,-p.r,p.r*2,p.r*2);
        ctx.restore();
      } else if(p.k==='WIND'){
        p.x+=p.vx; p.y+=p.vy+Math.sin(this.frame*0.1+p.x*0.04)*0.3;
        ctx.globalAlpha=a*0.6;
        ctx.strokeStyle=e.glow; ctx.lineWidth=1.4; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-16,p.y+2); ctx.stroke();
      } else { // THUNDER
        ctx.globalAlpha=a;
        ctx.strokeStyle=e.glow; ctx.lineWidth=1.8; ctx.lineCap='round';
        ctx.shadowColor=e.glow; ctx.shadowBlur=10;
        ctx.beginPath(); ctx.moveTo(p.x,p.y);
        let yy=p.y;
        for(let s2=0;s2<3;s2++){ yy+=9; ctx.lineTo(p.x+p.seg[s2],yy); }
        ctx.stroke(); ctx.shadowBlur=0;
      }
    }
    ctx.restore();
  },

  rGame(ctx){
    // 夜の背景
    ctx.fillStyle='#0b0c16'; ctx.fillRect(0,0,CW,CH);
    // 木枠（戦場の縁）
    ctx.fillStyle='#3a2c1e';
    ctx.fillRect(FX-6,FY-6,FW+12,FH+12);
    ctx.strokeStyle='rgba(212,175,55,0.28)'; ctx.lineWidth=1;
    ctx.strokeRect(FX-6.5,FY-6.5,FW+13,FH+13);
    // 中庭の地面
    ctx.fillStyle='#15161f';
    ctx.fillRect(FX,FY,FW,FH);
    // 畳目（市松の淡い陰影）
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      if((c+r)%2===0)continue;
      ctx.fillStyle='rgba(255,255,255,0.014)';
      ctx.fillRect(FX+c*CS,FY+r*CS,CS,CS);
    }
    if(this.field)this.field.draw(ctx);
    for(const m of this.allMines)m.draw(ctx);
    if(this.p1)this.p1.draw(ctx);
    if(this.p2)this.p2.draw(ctx);
    for(const e of this.enemies)e.draw(ctx);
    for(const b of this.allBullets)b.draw(ctx);
    for(const e of this.explosions)e.draw(ctx);
    // 手裏剣の軌道予測（時間が止まっているときだけ見える）
    if(this.state===ST.PLAY&&this.startT<=0)this.rAimGuide(ctx);
    // 時間停止の演出（藍墨のトーン＋ビネット）
    const fz=1-this.ts;
    if(fz>0.05){
      ctx.save();
      ctx.fillStyle=`rgba(40,52,96,${(fz*0.12).toFixed(3)})`;
      ctx.fillRect(FX,FY,FW,FH);
      const g=ctx.createRadialGradient(CW/2,CH/2,CH*0.35,CW/2,CH/2,CH*0.78);
      g.addColorStop(0,'rgba(0,0,0,0)');
      g.addColorStop(1,`rgba(8,10,24,${(fz*0.5).toFixed(3)})`);
      ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);
      if(fz>0.85&&this.state===ST.PLAY){
        ctx.globalAlpha=0.18+0.07*Math.sin(this.frame*0.05);
        ctx.font='bold 15px '+FJ; ctx.textAlign='center'; ctx.fillStyle='#A8C5E8';
        ctx.fillText('― 動けば、時が動く ―', CW/2, CH-14);
      }
      ctx.restore(); ctx.textAlign='left';
    }
    this.rHUD(ctx);
    if(this.startT>0){
      const a=Math.min(1,this.startT/30);
      ctx.save(); ctx.globalAlpha=a*0.75;
      ctx.fillStyle='#06060c'; ctx.fillRect(0,0,CW,CH);
      ctx.globalAlpha=a;
      ctx.font='bold 56px '+FJ; ctx.textAlign='center'; ctx.fillStyle=WASHI;
      ctx.fillText('第'+kanjiNum(this.mission)+'幕', CW/2, CH/2-10);
      // 朱の筆線
      ctx.strokeStyle='rgba(199,62,58,0.85)'; ctx.lineWidth=5; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(CW/2-110,CH/2+8); ctx.quadraticCurveTo(CW/2,CH/2+15,CW/2+110,CH/2+6);
      ctx.stroke();
      ctx.font='20px '+FJ; ctx.fillStyle='#C9BFA8';
      ctx.fillText('残命 '+kanjiNum(this.lives+1), CW/2, CH/2+44);
      const ie=GOTON[this.element]||GOTON.FIRE;
      ctx.font='17px '+FJ; ctx.fillStyle=ie.col;
      ctx.fillText('流派　'+ie.name, CW/2, CH/2+74);
      ctx.font='16px '+FJ; ctx.fillStyle='#A8C5E8';
      ctx.fillText('動けば、時が動く。静寂の中で狙いを定めよ。', CW/2, CH/2+108);
      ctx.restore(); ctx.textAlign='left';
    }
  },

  // 手裏剣の軌道予測線（時間停止中ほど濃く表示）
  rAimGuide(ctx){
    const p=this.p1;
    if(!p||p.dead||!this.field)return;
    const a=1-this.ts;
    if(a<0.3)return;
    let x=p.x+Math.cos(p.tAngle)*(TANK_SZ/2+BULLET_R+2);
    let y=p.y+Math.sin(p.tAngle)*(TANK_SZ/2+BULLET_R+2);
    let vx=Math.cos(p.tAngle)*4, vy=Math.sin(p.tAngle)*4, b=p.maxBnc;
    const pts=[{x,y}]; let kill=false;
    for(let s=0;s<420;s++){
      x+=vx; y+=vy;
      const wh=this.field.bulletHit(x,y,false);
      if(wh){
        if(b<=0){pts.push({x,y});break;}
        const dot=vx*wh.nx+vy*wh.ny;
        vx-=2*dot*wh.nx; vy-=2*dot*wh.ny; b--;
        if(wh.nx)x+=wh.nx*BULLET_R*1.5;
        if(wh.ny)y+=wh.ny*BULLET_R*1.5;
        pts.push({x,y});
        continue;
      }
      const h=TANK_SZ/2; let ht=false;
      for(const e of this.enemies){
        if(e.dead||e.invisible)continue;
        if(x>e.x-h&&x<e.x+h&&y>e.y-h&&y<e.y+h){ht=true;break;}
      }
      if(ht){pts.push({x,y});kill=true;break;}
      if(s===419)pts.push({x,y});
    }
    const ec=GOTON[this.element]||GOTON.FIRE;
    ctx.save();
    ctx.globalAlpha=a*0.5;
    ctx.strokeStyle=ec.col; ctx.lineWidth=1.5;
    ctx.setLineDash([6,9]);
    ctx.lineDashOffset=-(this.frame*0.6)%15;
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);
    ctx.stroke();
    ctx.setLineDash([]);
    const e0=pts[pts.length-1];
    if(kill){
      ctx.strokeStyle=SHU; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(e0.x,e0.y,9,0,PI2); ctx.stroke();
      ctx.beginPath(); ctx.arc(e0.x,e0.y,2.5,0,PI2); ctx.fillStyle=SHU; ctx.fill();
    } else {
      ctx.beginPath(); ctx.arc(e0.x,e0.y,4,0,PI2); ctx.fillStyle=ec.glow; ctx.fill();
    }
    ctx.restore();
  },

  rHUD(ctx){
    // 上部の帯（墨）
    ctx.fillStyle='rgba(10,9,18,0.94)';
    ctx.fillRect(0,0,CW,FY-5);
    ctx.strokeStyle='rgba(212,175,55,0.30)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(0,FY-5.5); ctx.lineTo(CW,FY-5.5); ctx.stroke();
    ctx.fillStyle=WASHI; ctx.font='bold 20px '+FJ; ctx.textAlign='left';
    ctx.fillText('第'+kanjiNum(this.mission)+'幕', FX, 36);
    if(this.mode==='1p'){
      ctx.fillStyle='#FF9D7E'; ctx.font='17px '+FJ;
      ctx.fillText('残命 '+kanjiNum(this.lives+1), 230, 35);
      ctx.fillStyle='#C9BFA8';
      ctx.fillText('討伐 '+this.score, 370, 35);
    } else {
      ctx.font='17px '+FJ;
      ctx.fillStyle='#9FC6FF'; ctx.fillText('蒼 '+this.score, 240, 35);
      ctx.fillStyle='#FFB3A0'; ctx.fillText('朱 '+this.p2Score, 350, 35);
    }
    // 静⇄動 ゲージ（「動」は流派の色で満ちる）
    const bx=565, bw=160, by=21;
    const flow=this.ts>0.5;
    const hc=GOTON[this.element]||GOTON.FIRE;
    ctx.font='bold 20px '+FJ; ctx.textAlign='center';
    ctx.fillStyle=flow?hc.col:'#7FA8D9';
    ctx.fillText(flow?'動':'静', bx-22, by+17);
    ctx.fillStyle='rgba(255,255,255,0.08)'; ctx.fillRect(bx,by,bw,11);
    ctx.fillStyle=flow?hc.col:'rgba(127,168,217,0.9)';
    ctx.fillRect(bx,by,bw*clamp(this.ts/TS_MAX,0,1),11);
    ctx.strokeStyle='rgba(242,232,213,0.3)'; ctx.lineWidth=1;
    ctx.strokeRect(bx+0.5,by+0.5,bw-1,10);
    // 敵影
    const rem=this.enemies.filter(e=>!e.dead).length;
    ctx.fillStyle='#FF7E6B'; ctx.font='bold 19px '+FJ; ctx.textAlign='right';
    ctx.fillText('敵影 '+kanjiNum(rem), CW-FX, 36);
    ctx.textAlign='left';
  },

  rPause(ctx){
    ctx.fillStyle='rgba(4,4,10,0.6)'; ctx.fillRect(0,0,CW,CH);
    ctx.font='bold 50px '+FJ; ctx.textAlign='center'; ctx.fillStyle=WASHI;
    ctx.fillText('小休止', CW/2, CH/2-20);
    ctx.font='18px '+FJ; ctx.fillStyle='#C9BFA8';
    ctx.fillText('Esc / P で再開', CW/2, CH/2+40);
    ctx.textAlign='left';
  },

  rClear(ctx){
    const p=(120-this.clearT)/120;
    ctx.save(); ctx.globalAlpha=Math.min(1,p*2);
    ctx.fillStyle='rgba(4,4,10,0.45)'; ctx.fillRect(0,0,CW,CH);
    ctx.font='bold 66px '+FJ; ctx.textAlign='center';
    ctx.fillStyle=WASHI;
    ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=14;
    ctx.fillText('任務完了', CW/2, CH/2+12);
    ctx.shadowBlur=0;
    if(p>0.25)this.rSeal(ctx, CW/2+210, CH/2-12, 64, '完', -0.12);
    ctx.restore(); ctx.textAlign='left';
  },

  rOver(ctx){
    const won=this.mode==='1p'&&this.mission>100;
    ctx.fillStyle='#07070f'; ctx.fillRect(0,0,CW,CH);
    ctx.font='bold 64px '+FJ; ctx.textAlign='center';
    ctx.fillStyle=won?KIN:SHU;
    ctx.shadowColor=won?'rgba(212,175,55,0.7)':'rgba(180,30,30,0.7)'; ctx.shadowBlur=22;
    ctx.fillText(won?'免許皆伝':'無念', CW/2, CH/2-60);
    ctx.shadowBlur=0;
    if(won)this.rSeal(ctx, CW/2+200, CH/2-78, 60, '皆伝', -0.1);
    ctx.fillStyle=WASHI; ctx.font='26px '+FJ;
    ctx.fillText('到達 第'+kanjiNum(Math.min(this.mission,100))+'幕', CW/2, CH/2+8);
    ctx.fillStyle='#C9BFA8'; ctx.font='22px '+FJ;
    ctx.fillText('討伐 '+this.score, CW/2, CH/2+52);
    ctx.fillStyle='#6e6650'; ctx.font='16px '+FJ;
    ctx.fillText('Space / Enter で戻る', CW/2, CH/2+110);
    ctx.textAlign='left';
  },

  rResult(ctx){
    ctx.fillStyle='#07070f'; ctx.fillRect(0,0,CW,CH);
    ctx.font='bold 50px '+FJ; ctx.textAlign='center'; ctx.fillStyle=WASHI;
    ctx.fillText('勝負あり', CW/2, 145);
    ctx.font='30px '+FJ;
    ctx.fillStyle='#9FC6FF'; ctx.fillText('蒼  討伐 '+this.score, CW/2, 260);
    ctx.fillStyle='#FFB3A0'; ctx.fillText('朱  討伐 '+this.p2Score, CW/2, 320);
    ctx.font='bold 44px '+FJ;
    if(this.score>this.p2Score){ctx.fillStyle='#9FC6FF';ctx.fillText('蒼の勝ち', CW/2, 425);}
    else if(this.p2Score>this.score){ctx.fillStyle='#FFB3A0';ctx.fillText('朱の勝ち', CW/2, 425);}
    else{ctx.fillStyle=KIN;ctx.fillText('相討ち', CW/2, 425);}
    ctx.fillStyle='#6e6650'; ctx.font='16px '+FJ;
    ctx.fillText('Space / Enter で戻る', CW/2, 510);
    ctx.textAlign='left';
  },
};

// ─── BOOT ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  const cv=document.getElementById('c');
  cv.width=CW; cv.height=CH;
  G.init(cv);
});
</script>
